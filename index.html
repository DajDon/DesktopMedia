<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desktop Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-start: #0d0620;
      --bg-mid: #2a0a3e;
      --bg-end: #1a0530;
      --yt: #ff0000;
      --twitch: #9146ff;
      --trovo: #1db954;
      --netflix: #e50914;
      --disney: #00b7c2;
      --hbo: #ffffff;
      --text: #ffffff;
      --card-bg: #0a0010;
      --glow-blur: 18px;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 30% 40%, var(--bg-mid) 0%, var(--bg-start) 60%, var(--bg-end) 100%);
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      color: var(--text);
      letter-spacing: 0.06em;
      text-shadow: 0 0 40px rgba(180,80,255,0.4);
      margin-bottom: 2.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.1rem;
    }

    .btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card-bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      letter-spacing: 0.03em;
      padding: 1rem 2.2rem;
      border-radius: 12px;
      border: 2.5px solid var(--border-color, #fff);
      cursor: pointer;
      text-decoration: none;
      outline: none;
      user-select: none;
      box-shadow: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.container {
  text-align: center;
}

.btn:hover {
  transform: scale(1.07) translateY(-3px);
  box-shadow: 0 0 var(--glow-blur) var(--border-color), 0 6px 24px rgba(0,0,0,0.5);
}

    .youtube  { --border-color: var(--yt); }
    .twitch   { --border-color: var(--twitch); }
    .trovo    { --border-color: var(--trovo); }
    .netflix  { --border-color: var(--netflix); }
    .disney   { --border-color: var(--disney); }
    .hbo      { --border-color: var(--hbo); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Desktop Media</h1>
    <div class="grid">
      <a class="btn youtube" href="https://youtube.com">YouTube</a>
      <a class="btn twitch"  href="https://twitch.tv">Twitch</a>
      <a class="btn trovo"   href="https://trovo.live">Trovo</a>
      <a class="btn netflix" href="https://netflix.com">Netflix</a>
      <a class="btn disney"  href="https://disneyplus.com">Disney+</a>
      <a class="btn hbo"     href="https://max.com">HBO</a>
    </div>
  </div>
</body>
</html>
